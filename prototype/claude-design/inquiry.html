<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小猫怎么了 · 分诊问诊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="variations/shared.css">
<style>
  body{background:radial-gradient(130% 90% at 50% 0%,#f0ece4,#e4e0d7);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
  .device-wrap{transform-origin:center center;}
  .device{width:390px;height:844px;border-radius:46px;background:#111014;padding:11px;box-shadow:0 44px 90px -34px rgba(45,35,25,.55),0 0 0 1px rgba(0,0,0,.5);position:relative;}
  .device::before{content:"";position:absolute;top:11px;left:50%;transform:translateX(-50%);width:128px;height:30px;background:#111014;border-radius:0 0 18px 18px;z-index:50;}
  .phone{border-radius:36px;background:var(--bg);}

  /* progress header */
  .phead{flex:none;padding:2px 18px 0;}
  .phead .row{display:flex;align-items:center;gap:10px;}
  .phead .back{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);cursor:pointer;flex:none;transition:transform .14s;}
  .phead .back:active{transform:scale(.9);}
  .phead .ttl{flex:1;text-align:center;font-size:14px;font-weight:600;color:var(--ink);letter-spacing:.5px;}
  .phead .ttl b{color:var(--terra);}
  .phead .spacer{width:36px;flex:none;}
  .pbar{height:4px;border-radius:3px;background:var(--line);margin:12px 2px 0;overflow:hidden;}
  .pbar i{display:block;height:100%;width:50%;border-radius:3px;background:linear-gradient(90deg,#c97a6f,var(--terra));transition:width .4s;}

  .screen{padding:18px 20px 120px;}
  .ctx{display:inline-flex;align-items:center;gap:8px;background:var(--card);padding:7px 13px;border-radius:20px;box-shadow:var(--soft-sm);font-size:12.5px;color:var(--ink-soft);}
  .ctx .d{width:8px;height:8px;border-radius:50%;background:var(--risk-red);}
  .q{font-family:var(--serif);font-weight:600;font-size:24px;line-height:1.35;letter-spacing:.4px;margin-top:15px;text-wrap:pretty;}
  .q .multi{font-family:var(--sans);font-size:14px;font-weight:500;color:var(--ink-faint);margin-left:6px;}
  .hint{font-size:13px;color:var(--ink-soft);margin-top:10px;line-height:1.6;}

  .opts{margin-top:18px;display:flex;flex-direction:column;gap:10px;}
  .opt{display:flex;align-items:center;gap:13px;background:var(--card);border-radius:18px;padding:12px 15px;box-shadow:var(--soft-sm);cursor:pointer;border:1.5px solid transparent;transition:transform .14s,border-color .14s,box-shadow .14s;}
  .opt:active{transform:scale(.99);}
  .opt .ill{width:48px;height:48px;border-radius:14px;background:var(--terra-tint);color:var(--terra);display:flex;align-items:center;justify-content:center;flex:none;}
  .opt .ot{flex:1;min-width:0;}
  .opt .ot .o1{display:block;font-size:15px;font-weight:600;letter-spacing:.3px;line-height:1.35;}
  .opt .ot .o2{display:block;font-size:11.5px;color:var(--ink-faint);margin-top:3px;letter-spacing:.1px;}
  .opt .cb{width:24px;height:24px;border-radius:8px;border:2px solid #dcd6cb;flex:none;display:flex;align-items:center;justify-content:center;transition:all .14s;}
  .opt .cb svg{display:none;}
  .opt.sel{border-color:#b05a50;box-shadow:0 6px 18px rgba(176,90,80,.16);}
  .opt.sel .cb{background:#b05a50;border-color:#b05a50;}
  .opt.sel .cb svg{display:block;}

  .divnone{display:flex;align-items:center;gap:10px;margin:16px 2px 6px;}
  .divnone .ln{flex:1;height:1px;background:var(--line);}
  .divnone .t{font-size:11.5px;color:var(--ink-faint);letter-spacing:.5px;}
  .opt.none .ill{background:#eeebe4;color:#9a958c;}
  .opt.none.sel{border-color:#9a958c;box-shadow:0 6px 16px rgba(120,110,90,.14);}
  .opt.none.sel .cb{background:#6b675f;border-color:#6b675f;}

  .dock{position:absolute;left:0;right:0;bottom:0;z-index:20;padding:12px 20px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(247,246,243,0),var(--bg) 30%);}
  .nextb{width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,#bd6258,var(--terra) 45%,var(--terra-deep));color:#fff;border-radius:18px;padding:16px;display:flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap;justify-content:center;gap:9px;font-family:var(--sans);font-weight:600;font-size:16px;letter-spacing:.5px;box-shadow:0 12px 26px rgba(176,90,80,.34);transition:transform .14s,opacity .2s;}
  .nextb:active{transform:scale(.99);}
  .nextb.off{opacity:.45;pointer-events:none;box-shadow:none;}
  .foot{text-align:center;font-size:11px;color:var(--ink-faint);letter-spacing:.5px;margin-top:11px;}
</style>
</head>
<body>
  <div class="device-wrap" id="wrap">
  <div class="device">
  <div class="phone" data-screen-label="分诊问诊">
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="sb-right">
        <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#1a1a18"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 11.2 1 4.3a10.6 10.6 0 0 1 15 0L8.5 11.2Z" fill="#1a1a18"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3.2" fill="none" stroke="#1a1a18" stroke-opacity=".4" stroke-width="1"/><rect x="2.6" y="2.6" width="16" height="7.8" rx="2" fill="#1a1a18"/><rect x="23.4" y="4" width="1.8" height="5" rx="1" fill="#1a1a18" fill-opacity=".4"/></svg>
      </span>
    </div>

    <div class="phead">
      <div class="row">
        <span class="back" id="backBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></span>
        <span class="ttl">分诊中 · <b>1</b> / 2</span>
        <span class="spacer"></span>
      </div>
      <div class="pbar"><i></i></div>
    </div>

    <div class="screen">
      <span class="ctx"><span class="d"></span>症状 · 可能误食</span>
      <div class="q">它可能吃下、舔到、或咬破了哪种东西?<span class="multi">可多选</span></div>
      <div class="hint">它真的接触到的才勾;都没有就选最后一项。<b style="color:var(--ink);font-weight:600">勾得越准,判级越靠谱。</b></div>

      <div class="opts" id="opts">
        <div class="opt" data-v="药">
          <span class="ill"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="9.5" width="16" height="8" rx="4" transform="rotate(-40 11.5 13.5)"/><path d="m8.7 8.2 5.1 5.1"/><circle cx="17" cy="7" r="3.2"/></svg></span>
          <span class="ot"><span class="o1">人吃的药</span><span class="o2">止痛药、感冒药、保健品…</span></span>
          <span class="cb"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        </div>
        <div class="opt" data-v="植物">
          <span class="ill"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="6.5" r="2.4"/><circle cx="8.4" cy="8.8" r="2.4"/><circle cx="15.6" cy="8.8" r="2.4"/><circle cx="12" cy="10.6" r="1.5" fill="currentColor" stroke="none"/><path d="M12 12.2V20"/><path d="M12 16.8c2.4 0 3.8-1.3 4.3-3.3"/></svg></span>
          <span class="ot"><span class="o1">百合 · 植物 / 鲜花</span><span class="o2">含花粉、插花的水</span></span>
          <span class="cb"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        </div>
        <div class="opt" data-v="化学">
          <span class="ill"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 3.5h5M10.5 3.5v3.2l-3.4 6.1a2 2 0 0 0 1.7 3h6.4a2 2 0 0 0 1.7-3l-3.4-6.1V3.5"/><path d="M7.8 13.5h8.4"/><path d="M12 9.8v2.4M12 14.5v.3"/></svg></span>
          <span class="ot"><span class="o1">灭鼠药 · 杀虫剂 · 防冻液</span><span class="o2">等化学品</span></span>
          <span class="cb"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        </div>
        <div class="opt" data-v="食物">
          <span class="ill"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="6" width="14" height="12" rx="2"/><path d="M5 10h14M5 14h14M9.7 6v12M14.3 6v12"/></svg></span>
          <span class="ot"><span class="o1">巧克力 · 洋葱 · 葡萄</span><span class="o2">木糖醇口香糖等</span></span>
          <span class="cb"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        </div>
        <div class="opt" data-v="线绳">
          <span class="ill"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="12" r="7"/><path d="M5.6 9c3.3 2 7.4 2 10.6.2M5 13c3.6 2 8.1 2 11.4.4M8.2 6.4c1.9 4 1.9 8.2 0 11.2"/><path d="M17.4 14.2c1.9.9 3 2.4 3 4.3"/></svg></span>
          <span class="ot"><span class="o1">线 · 绳 · 丝带 · 橡皮筋</span><span class="o2">这类细长东西</span></span>
          <span class="cb"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        </div>
        <div class="opt" data-v="其它">
          <span class="ill"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.6 9.6a2.5 2.5 0 1 1 3.3 2.5c-.8.3-1.1.8-1.1 1.6M12 16.4v.3"/></svg></span>
          <span class="ot"><span class="o1">别的不该吃的</span><span class="o2">说不清,或不在上面</span></span>
          <span class="cb"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        </div>
      </div>

      <div class="divnone"><span class="ln"></span><span class="t">以上都没有</span><span class="ln"></span></div>
      <div class="opts">
        <div class="opt none" data-v="没有">
          <span class="ill"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19s-6-3.8-6-8.3A3.4 3.4 0 0 1 12 8a3.4 3.4 0 0 1 6 2.7C18 15.2 12 19 12 19Z"/></svg></span>
          <span class="ot"><span class="o1">其实没有,只是担心</span><span class="o2">勾这项会跳过误食追问</span></span>
          <span class="cb"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg></span>
        </div>
      </div>
    </div>

    <div class="dock">
      <button class="nextb off" id="nextb"><span id="nbLabel">先选一项</span> <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 6l6 6-6 6"/></svg></button>
      <div class="foot">AI 整理 · 不能替代兽医</div>
    </div>
  </div>
  </div>
  </div>

<script>
  var TRIAGE='分诊.html', REPORT='安心报告.html';
  function fit(){var w=document.getElementById('wrap');var s=Math.min(1,(innerHeight-32)/844,(innerWidth-32)/390);w.style.transform='scale('+s+')';}
  addEventListener('resize',fit);fit();
  document.getElementById('backBtn').onclick=function(){location.href=TRIAGE;};

  var nextb=document.getElementById('nextb'), nbLabel=document.getElementById('nbLabel');
  function refresh(){
    var n=document.querySelectorAll('.opt.sel').length;
    nextb.classList.toggle('off', n===0);
    var none=document.querySelector('.opt.none').classList.contains('sel');
    nbLabel.textContent = n===0 ? '先选一项' : (none ? '跳过 · 看结果' : ('下一题 · 已选 '+n+' 项'));
  }
  document.querySelectorAll('.opt').forEach(function(o){
    o.onclick=function(){
      var isNone=o.classList.contains('none');
      if(isNone){
        var was=o.classList.contains('sel');
        document.querySelectorAll('.opt').forEach(function(x){x.classList.remove('sel');});
        if(!was) o.classList.add('sel');
      } else {
        document.querySelector('.opt.none').classList.remove('sel');
        o.classList.toggle('sel');
      }
      refresh();
    };
  });
  nextb.onclick=function(){
    if(nextb.classList.contains('off'))return;
    // any high-risk item OR "其它" -> red; "没有" alone -> still asks remaining, demo to green
    var none=document.querySelector('.opt.none').classList.contains('sel');
    var t = none ? 'green' : 'red';
    location.href=REPORT+'?s='+encodeURIComponent('可能误食')+'&t='+t;
  };
</script>
</body>
</html>
