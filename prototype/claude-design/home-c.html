  .pills{position:absolute;top:102px;right:18px;z-index:8;flex-direction:column;align-items:flex-end;}
  .bubble{left:116px;bottom:222px;max-width:168px;}

  .sheet{position:relative;z-index:9;flex:none;margin-top:-30px;background:var(--bg);border-radius:28px 28px 0 0;padding:16px 20px 6px;box-shadow:0 -10px 30px rgba(60,45,30,.1);}

  .cta{width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,#bd6258,var(--terra) 42%,var(--terra-deep));color:#fff;border-radius:20px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 12px 26px rgba(176,90,80,.34),inset 0 1px 0 rgba(255,255,255,.22);transition:transform .15s ease;font-family:var(--sans);}

  .cta .tt{text-align:left;}
  .cta .tt .t1{font-family:var(--serif);font-weight:600;font-size:18px;letter-spacing:.5px;}
  .cta .tt .t2{display:flex;align-items:center;gap:7px;font-size:11.5px;opacity:.9;margin-top:3px;letter-spacing:.3px;}
  .cta .tt .t2 .rgy i{width:7px;height:7px;box-shadow:0 0 0 2px rgba(255,255,255,.25);}
  .record{margin-top:12px;background:var(--card);box-shadow:var(--soft-sm);cursor:pointer;}
  /* secondary 问答 entry */
  .ask{width:100%;margin-top:10px;border:none;cursor:pointer;background:var(--card);color:var(--ink);border-radius:18px;padding:12px 15px;display:flex;align-items:center;gap:11px;box-shadow:var(--soft-sm);transition:transform .15s ease;font-family:var(--sans);}

  .ob.on{display:block;}

  .wc{background:var(--card);border-radius:28px;padding:30px 26px 24px;text-align:center;box-shadow:0 30px 70px -20px rgba(40,28,18,.5);width:100%;max-width:320px;opacity:1;animation:pop .42s cubic-bezier(.2,.9,.3,1.2);}

  .wc h2{font-family:var(--serif);font-weight:700;font-size:24px;letter-spacing:2px;}
  .wc .tag{font-size:12.5px;color:var(--terra);font-weight:600;margin-top:7px;letter-spacing:.4px;}
  .wc .desc{font-size:13.5px;color:var(--ink-soft);line-height:1.75;margin-top:14px;text-wrap:pretty;}
  .wc .rgyrow{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0 4px;font-size:12px;color:var(--ink-faint);}
  .wc .rgyrow .rgy i{width:8px;height:8px;}
  .wc .acts{margin-top:18px;display:flex;flex-direction:column;gap:10px;}
  .wc .b1{border:none;cursor:pointer;background:linear-gradient(180deg,#bd6258,var(--terra) 45%,var(--terra-deep));color:#fff;font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:1px;padding:14px;border-radius:16px;box-shadow:0 10px 22px rgba(176,90,80,.32);transition:transform .14s ease;}

  .wc .b2{border:none;background:none;cursor:pointer;color:var(--ink-faint);font-family:var(--sans);font-size:13px;letter-spacing:.4px;padding:4px;}

  .coach.on{display:block;}
  .dim{position:absolute;background:rgba(34,24,16,.6);transition:all .35s cubic-bezier(.3,.8,.3,1);}
  .spot{position:absolute;border-radius:18px;transition:all .35s cubic-bezier(.3,.8,.3,1);pointer-events:none;}
  .spot::after{content:"";position:absolute;inset:-3px;border-radius:inherit;border:2px solid rgba(255,255,255,.85);animation:halo 1.6s ease-in-out infinite;}

  .tip{position:absolute;background:var(--card);border-radius:18px;padding:16px 17px 14px;width:248px;box-shadow:0 20px 44px -14px rgba(40,28,18,.5);transition:all .35s cubic-bezier(.3,.8,.3,1);}

  .tip h3{font-family:var(--serif);font-weight:600;font-size:16.5px;margin-top:5px;letter-spacing:.4px;}
  .tip p{font-size:13px;color:var(--ink-soft);line-height:1.7;margin-top:7px;text-wrap:pretty;}
  .tip .trow{display:flex;align-items:center;justify-content:space-between;margin-top:15px;}
  .tip .dots{display:flex;gap:6px;}

  .tip .tbtns{display:flex;align-items:center;gap:12px;}
  .tip .skip{border:none;background:none;cursor:pointer;color:var(--ink-faint);font-size:12.5px;font-family:var(--sans);white-space:nowrap;}
  .tip .next{border:none;cursor:pointer;background:var(--terra);color:#fff;font-family:var(--sans);font-weight:600;font-size:13.5px;letter-spacing:.5px;padding:9px 16px;border-radius:12px;transition:transform .14s;white-space:nowrap;}
  .tip .next:active{transform:scale(.95);}
  .tip .arrow{position:absolute;width:14px;height:14px;background:var(--card);transform:rotate(45deg);}
</style>

    var wrap=document.getElementById('wrap');
    var s=Math.min(1,(window.innerHeight-32)/844,(window.innerWidth-32)/390);
    wrap.style.transform='scale('+s+')';
  }
  window.addEventListener('resize',fit); fit();

  // ---- toast ----
  var toast=document.getElementById('toast'), toastT;
  function showToast(msg){
    toast.textContent=msg; toast.classList.add('show');
    clearTimeout(toastT); toastT=setTimeout(function(){toast.classList.remove('show');},1900);
  }

  // ---- demo interactions ----
  var hints={
    '看病':'进入分诊 · 选症状,给你红黄绿建议',
    '聊天':'和哈基米聊天,记录它今天的状态',
    '小知识':'小知识 · 新手养猫每天该喂多少水?',
    '梳子':'长按可以把梳子拖给哈基米梳毛',
    '水':'长按把水拖到碗上,记一次喝水',
    '逗猫棒':'长按拖动逗猫棒,陪它玩一会儿',
    '首页':'当前就在首页 · 哈基米的院子',
    '分诊':'分诊 · 按症状一步步排查',
    '问答':'问答 · 喂养 / 习性 / 病情都能问哈基米',
    '毛孩子':'毛孩子 · 哈基米的档案与健康记录'
  };
  var TRIAGE='分诊.html', ASK='问答.html', PET='毛孩子.html';
  var NAV={'看病':TRIAGE,'分诊':TRIAGE,'问答':ASK,'毛孩子':PET};
  document.querySelectorAll('[data-act]').forEach(function(el){
    el.addEventListener('click',function(){
      if(document.getElementById('ob').classList.contains('on'))return;
      var dest=NAV[el.dataset.act];
      if(dest){ location.href=dest; return; }
      showToast(hints[el.dataset.act]||'');
    });
  });
  function chat(){ if(document.getElementById('ob').classList.contains('on'))return; location.href=ASK; }
  document.getElementById('cat').addEventListener('click',chat);
  document.getElementById('catBubble').addEventListener('click',chat);
  document.getElementById('ctaBtn').addEventListener('click',function(){ if(document.getElementById('ob').classList.contains('on'))return; location.href=TRIAGE; });
  document.getElementById('recordRow').addEventListener('click',function(){ showToast('查看这条记录的详情与建议'); });

  // ---- onboarding ----
  var KEY='kitten_c_onboarded_v1';
  var ob=document.getElementById('ob'), welcome=document.getElementById('welcome'), coach=document.getElementById('coach');
  var spot=document.getElementById('spot'), tip=document.getElementById('tip'), tarrow=document.getElementById('tarrow');
  var cat=document.getElementById('cat');

  var steps=[
    {sel:'.cta', title:'拿不准?先做分诊', body:'选几个症状,30 秒给你红 / 黄 / 绿三档建议——该不该去医院,一眼明白。', place:'above'},
    {sel:'#askBtn', title:'还想多问,就问它', body:'喂养、习性、行为、拿不准的病情都能问哈基米;刚做完的分诊结果,也能带着继续追问。', place:'above'},
    {sel:'#cat', title:'它一直陪着你', body:'平时哈基米在院子里溜达陪你;身体出现异常,它也会主动在这儿提醒你。', place:'below'}
  ];
  var step=0;

  function localRect(el){
    var phone=document.querySelector('.phone');
    var pr=phone.getBoundingClientRect();
    var scale=pr.width/phone.offsetWidth; // accounts for device-wrap scaling
    var r=el.getBoundingClientRect();
    return {left:(r.left-pr.left)/scale, top:(r.top-pr.top)/scale, width:r.width/scale, height:r.height/scale};
  }

  function renderStep(){
    var st=steps[step];
    var el=document.querySelector(st.sel);
    var r=localRect(el);
    var pad=st.sel==='#cat'?10:8;
    var sx=Math.max(8,r.left-pad), sy=Math.max(8,r.top-pad);
    var sw=r.width+pad*2, sh=r.height+pad*2;
    spot.style.left=sx+'px'; spot.style.top=sy+'px'; spot.style.width=sw+'px'; spot.style.height=sh+'px';

    // 4-panel dim around the spotlight
    var H=document.querySelector('.phone').offsetHeight, W=390;
    function setDim(id,l,t,w,h){var e=document.getElementById(id);e.style.left=l+'px';e.style.top=t+'px';e.style.width=Math.max(0,w)+'px';e.style.height=Math.max(0,h)+'px';}
    setDim('dimT',0,0,W,sy);
    setDim('dimB',0,sy+sh,W,H-(sy+sh));
    setDim('dimL',0,sy,sx,sh);
    setDim('dimR',sx+sw,sy,W-(sx+sw),sh);

    document.getElementById('tnum').textContent='第 '+(step+1)+' 步 / 共 '+steps.length+' 步';
    document.getElementById('thead').textContent=st.title;
    document.getElementById('tbody').textContent=st.body;
    document.querySelectorAll('#dots i').forEach(function(d,i){ d.classList.toggle('on',i===step); });
    document.getElementById('nextStep').textContent = step===steps.length-1 ? '开始体验' : '下一步';

    // position tip
    var tipW=248, tipH=tip.offsetHeight||150, margin=14;
    var cx=sx+sw/2;
    var tl=Math.min(390-tipW-14, Math.max(14, cx-tipW/2));
    var tt;
    if(st.place==='above'){ tt=sy-tipH-margin; tarrow.style.top='auto'; tarrow.style.bottom='-7px'; }
    else { tt=sy+sh+margin; tarrow.style.bottom='auto'; tarrow.style.top='-7px'; }
    tip.style.left=tl+'px'; tip.style.top=tt+'px';
    tarrow.style.left=Math.min(tipW-26, Math.max(14, cx-tl-7))+'px';
  }

  function startTour(){
    welcome.style.display='none'; coach.classList.add('on'); ob.classList.add('on');
    cat.style.animationPlayState='paused';
    step=0; setTimeout(renderStep,30);
  }
  function endOb(){
    ob.classList.remove('on'); coach.classList.remove('on');
    cat.style.animationPlayState='running';
    try{localStorage.setItem(KEY,'1');}catch(e){}
  }
  function openWelcome(){
    welcome.style.display='flex'; coach.classList.remove('on'); ob.classList.add('on');
    cat.style.animationPlayState='paused';
  }

  document.getElementById('tourBtn').addEventListener('click',startTour);
  document.getElementById('skipWelcome').addEventListener('click',endOb);
  document.getElementById('skipTour').addEventListener('click',endOb);
  document.getElementById('nextStep').addEventListener('click',function(){
    if(step<steps.length-1){ step++; renderStep(); } else { endOb(); showToast('随时点右上角的「?」再看一遍'); }
  });
  document.getElementById('helpBtn').addEventListener('click',openWelcome);
  window.addEventListener('resize',function(){ if(coach.classList.contains('on')) renderStep(); });

  // first run
  var seen=false; try{seen=localStorage.getItem(KEY)==='1';}catch(e){}
  if(!seen){ cat.style.animationPlayState='paused'; ob.classList.add('on'); }
  else { ob.classList.remove('on'); }
</script>
</body>
</html>
