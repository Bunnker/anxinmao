<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 C · 院子沉浸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .phone{background:linear-gradient(180deg,#f5e6d6,#f1dcc6 40%,var(--bg) 70%);}
  .statusbar{position:absolute;top:0;left:0;right:0;}

  /* immersive full-bleed yard */
  .stage{position:relative;flex:1;overflow:hidden;}
  .yard{position:absolute;inset:0;width:100%;height:100%;border-radius:0;box-shadow:none;background:linear-gradient(180deg,#f6e8d8 0%,#f1dcc6 50%);}
  .yard .floor{height:34%;}
  .yard .window{top:78px;left:150px;width:96px;height:108px;}

  /* floating greeting */
  .float-greet{position:absolute;top:58px;left:20px;z-index:8;display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.5);-webkit-backdrop-filter:blur(10px) saturate(1.3);backdrop-filter:blur(10px) saturate(1.3);padding:7px 14px 7px 8px;border-radius:30px;box-shadow:0 6px 16px rgba(120,90,60,.14),inset 0 0 0 1px rgba(255,255,255,.6);}
  .float-greet .avatar{width:38px;height:38px;box-shadow:inset 0 0 0 2px #fff;}
  .float-greet .fg-t .hi{font-family:var(--serif);font-weight:600;font-size:15px;letter-spacing:.2px;line-height:1.1;}
  .float-greet .fg-t .meta{font-size:11px;color:var(--ink-soft);margin-top:1px;}

  .pills{position:absolute;top:60px;right:18px;z-index:8;flex-direction:column;align-items:flex-end;}
  .bubble{left:150px;bottom:252px;}
  .cat-walk{bottom:150px;left:130px;z-index:6;}

  /* care items floating on the floor */
  .care-float{position:absolute;left:20px;bottom:118px;z-index:7;display:flex;gap:10px;}
  .care-float .care-item{width:52px;height:52px;border-radius:15px;}
  .care-float .care-item svg{transform:scale(.86);}

  /* docked action sheet */
  .sheet{position:relative;z-index:9;flex:none;margin-top:-30px;background:var(--bg);border-radius:28px 28px 0 0;padding:16px 20px 6px;box-shadow:0 -10px 30px rgba(60,45,30,.1);}
  .sheet .grab{width:38px;height:4px;border-radius:3px;background:#e0dcd2;margin:0 auto 14px;}
  .cta{width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,#bd6258,var(--terra) 42%,var(--terra-deep));color:#fff;border-radius:20px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 12px 26px rgba(176,90,80,.34),inset 0 1px 0 rgba(255,255,255,.22);transition:transform .15s ease;font-family:var(--sans);}
  .cta:active{transform:translateY(1px) scale(.992);}
  .cta .cta-l{display:flex;align-items:center;gap:12px;}
  .cta .ico{width:38px;height:38px;border-radius:12px;flex:none;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;}
  .cta .tt{text-align:left;}
  .cta .tt .t1{font-family:var(--serif);font-weight:600;font-size:18px;letter-spacing:.5px;}
  .cta .tt .t2{display:flex;align-items:center;gap:7px;font-size:11.5px;opacity:.9;margin-top:3px;letter-spacing:.3px;}
  .cta .tt .t2 .rgy i{width:7px;height:7px;box-shadow:0 0 0 2px rgba(255,255,255,.25);}

  .record{margin-top:12px;background:var(--card);box-shadow:var(--soft-sm);}
</style>
</head>
<body>
  <div class="phone" data-screen-label="方案C首页">
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="sb-right">
        <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#1a1a18"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 11.2 1 4.3a10.6 10.6 0 0 1 15 0L8.5 11.2Z" fill="#1a1a18"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3.2" fill="none" stroke="#1a1a18" stroke-opacity=".4" stroke-width="1"/><rect x="2.6" y="2.6" width="16" height="7.8" rx="2" fill="#1a1a18"/><rect x="23.4" y="4" width="1.8" height="5" rx="1" fill="#1a1a18" fill-opacity=".4"/></svg>
      </span>
    </div>

    <!-- immersive yard -->
    <div class="stage">
      <div class="yard">
        <div class="sun"></div>
        <div class="window"><span class="cloud"></span></div>
        <div class="floor"></div>
      </div>

      <div class="float-greet">
        <div class="avatar"><span class="a-ear l"></span><span class="a-ear r"></span><span class="a-face"></span><span class="a-stripe"></span><span class="a-stripe s2"></span><span class="a-stripe s3"></span><span class="a-eye l"></span><span class="a-eye r"></span><span class="a-nose"></span></div>
        <div class="fg-t"><div class="hi">早上好,哈基米</div><div class="meta">6个月 · 母 · 橘猫</div></div>
      </div>

      <div class="pills">
        <div class="pill primary"><span class="dot"></span>看病</div>
        <div class="pill alt"><span class="dot"></span>聊天</div>
        <div class="pill alt"><span class="dot"></span>小知识</div>
      </div>

      <div class="rug" style="bottom:120px;"></div>
      <div class="bed" style="left:150px;bottom:114px;"></div>
      <div class="box" style="bottom:124px;"><span class="b-flap l"></span><span class="b-flap r"></span><span class="b-body"></span><span class="b-open"></span></div>
      <div class="yarn" style="bottom:124px;left:200px;"></div>

      <div class="bubble">你是来找我聊天的吗?<span class="go">→</span></div>
      <div class="cat-walk"><div class="cat"><span class="cat-shadow"></span><span class="c-tail"><i class="tstripe t1"></i><i class="tstripe t2"></i><i class="tstripe t3"></i></span><span class="c-leg back"></span><span class="c-leg front"></span><span class="c-body"><i class="bstripe s1"></i><i class="bstripe s2"></i><i class="bstripe s3"></i></span><span class="c-belly"></span><span class="c-head"><span class="c-ear l"><i></i></span><span class="c-ear r"><i></i></span><span class="c-cheek"></span><i class="c-hstripe"></i><i class="c-hstripe h2"></i><i class="c-hstripe h3"></i><span class="c-eye l"></span><span class="c-eye r"></span><span class="c-nose"></span><span class="c-mouth"></span></span></div></div>

      <!-- care items on floor -->
      <div class="care-float">
        <div class="care-item" title="梳子"><svg width="30" height="30" viewBox="0 0 32 32" fill="none"><rect x="9" y="3" width="14" height="13" rx="6.5" fill="#e9b27e" stroke="#cf8a4e" stroke-width="1.3"/><g stroke="#b9763c" stroke-width="1.4" stroke-linecap="round"><path d="M12 8v3M16 7.5v3.5M20 8v3"/></g><rect x="14.5" y="15" width="3" height="13" rx="1.5" fill="#d99a5c"/><circle cx="16" cy="25" r="1.6" fill="#fff"/></svg></div>
        <div class="care-item" title="喝水"><svg width="26" height="30" viewBox="0 0 26 32" fill="none"><rect x="7" y="9" width="12" height="20" rx="3" fill="#d9ecf0" stroke="#a9cdd6" stroke-width="1.3"/><rect x="9.5" y="3.5" width="7" height="6" rx="1.6" fill="#cfe6ec" stroke="#a9cdd6" stroke-width="1.2"/><rect x="8.5" y="16" width="9" height="11" rx="2" fill="#bfe0e8"/></svg></div>
        <div class="care-item" title="逗猫棒"><svg width="28" height="30" viewBox="0 0 30 32" fill="none"><path d="M7 28 L20 8" stroke="#caa06a" stroke-width="2" stroke-linecap="round"/><path d="M20 8c1-3 4-4 6-3-1 2-1 4-3 5M20 8c2-2 2-5 1-6-2 1-3 3-3 5M20 8c-2 0-4 2-4 4 2 0 4-1 5-3" fill="#e08a7e" opacity=".9"/><circle cx="20" cy="8" r="2.2" fill="#b05a50"/></svg></div>
      </div>
    </div>

    <!-- docked action sheet -->
    <div class="sheet">
      <div class="grab"></div>
      <button class="cta">
        <span class="cta-l">
          <span class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 3v5a4 4 0 0 0 8 0V3"/><path d="M4.8 3h-1M12.8 3h1"/><path d="M8.8 12v3a5 5 0 0 0 10 0v-2"/><circle cx="18.8" cy="11" r="2.2"/></svg></span>
          <span class="tt"><span class="t1">猫不对劲?选症状看病</span><span class="t2"><span class="rgy"><i class="r"></i><i class="y"></i><i class="g"></i></span>30 秒红黄绿就医建议</span></span>
        </span>
        <span class="arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </button>
      <div class="record">
        <span class="tier g"><i></i></span>
        <div class="rc">
          <div class="r1">打喷嚏几声,精神食欲都正常</div>
          <div class="r2"><span class="tag g">绿档 · 先观察</span><span>·</span><span>今天 08:12</span></div>
        </div>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab on"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3.5l9 7"/><path d="M5.2 9v10.5h13.6V9"/></svg></span><span>首页</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3.5" width="14" height="17" rx="2.5"/><path d="M9 3.5V6h6V3.5"/><path d="M8.5 11h7M8.5 15h4"/></svg></span><span>分诊</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5h16v11H9l-4 3.5v-3.5H4z"/><path d="M8.5 10h7M8.5 13h4"/></svg></span><span>问答</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8.5" r="2"/><circle cx="16" cy="8.5" r="2"/><circle cx="5" cy="13" r="1.7"/><circle cx="19" cy="13" r="1.7"/><path d="M12 12c-2.6 0-4.5 2-4.5 4.2 0 1.5 1.2 2.3 2.6 2.3 .9 0 1.3-.4 1.9-.4s1 .4 1.9.4c1.4 0 2.6-.8 2.6-2.3C16 14 14.6 12 12 12Z"/></svg></span><span>毛孩子</span></div>
    </div>
  </div>
</body>
</html>
