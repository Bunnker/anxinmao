<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 B · 分诊优先</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .greet{display:flex;align-items:center;gap:13px;padding:8px 2px 4px;}
  .greet-text .hi{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:.2px;}
  .greet-text .meta{font-size:13px;color:var(--ink-soft);margin-top:3px;letter-spacing:.2px;}
  .greet-text .meta b{color:var(--ink);font-weight:500;}
  .greet .spacer{flex:1;}
  .greet .bell{width:40px;height:40px;border-radius:50%;flex:none;background:var(--card);box-shadow:var(--soft-sm);display:flex;align-items:center;justify-content:center;color:var(--ink-soft);}

  .value{padding:14px 2px 0;}
  .value .lead{font-family:var(--serif);font-weight:600;font-size:22px;line-height:1.45;letter-spacing:.2px;text-wrap:pretty;}
  .value .lead .q{color:var(--terra);}
  .value .sub{display:flex;align-items:center;gap:9px;margin-top:11px;font-size:13px;color:var(--ink-soft);letter-spacing:.1px;}

  .cta{margin-top:16px;width:100%;border:none;cursor:pointer;background:linear-gradient(180deg,#bd6258,var(--terra) 42%,var(--terra-deep));color:#fff;border-radius:20px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 12px 26px rgba(176,90,80,.36),inset 0 1px 0 rgba(255,255,255,.22);transition:transform .15s ease,box-shadow .15s ease;font-family:var(--sans);}
  .cta:active{transform:translateY(1px) scale(.992);box-shadow:0 6px 16px rgba(176,90,80,.3);}
  .cta .cta-l{display:flex;align-items:center;gap:13px;}
  .cta .ico{width:40px;height:40px;border-radius:13px;flex:none;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;}
  .cta .tt{text-align:left;}
  .cta .tt .t1{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:1px;}
  .cta .tt .t2{font-size:12px;opacity:.85;margin-top:2px;letter-spacing:.4px;}

  .yard{height:248px;}
  .pills{position:absolute;top:16px;left:16px;z-index:6;}
  .bubble{left:44px;top:80px;}
  .cat-walk{bottom:26px;left:128px;z-index:4;}
</style>
</head>
<body>
  <div class="phone" data-screen-label="方案B首页">
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="sb-right">
        <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#1a1a18"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 11.2 1 4.3a10.6 10.6 0 0 1 15 0L8.5 11.2Z" fill="#1a1a18"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3.2" fill="none" stroke="#1a1a18" stroke-opacity=".4" stroke-width="1"/><rect x="2.6" y="2.6" width="16" height="7.8" rx="2" fill="#1a1a18"/><rect x="23.4" y="4" width="1.8" height="5" rx="1" fill="#1a1a18" fill-opacity=".4"/></svg>
      </span>
    </div>

    <div class="screen">
      <!-- slim greeting -->
      <div class="greet">
        <div class="avatar"><span class="a-ear l"></span><span class="a-ear r"></span><span class="a-face"></span><span class="a-stripe"></span><span class="a-stripe s2"></span><span class="a-stripe s3"></span><span class="a-eye l"></span><span class="a-eye r"></span><span class="a-nose"></span></div>
        <div class="greet-text">
          <div class="hi">早上好,哈基米</div>
          <div class="meta"><b>6个月</b> · 母 · 橘猫</div>
        </div>
        <div class="spacer"></div>
        <div class="bell"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
      </div>

      <!-- value prop + CTA -->
      <div class="value">
        <div class="lead"><span class="q">猫不对劲?</span>选症状,<br>30 秒给你红黄绿就医建议</div>
        <div class="sub">
          <span class="rgy"><i class="r"></i><i class="y"></i><i class="g"></i></span>
          <span>三档风险,该不该去医院一眼明白</span>
        </div>
        <button class="cta">
          <span class="cta-l">
            <span class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.8 3v5a4 4 0 0 0 8 0V3"/><path d="M4.8 3h-1M12.8 3h1"/><path d="M8.8 12v3a5 5 0 0 0 10 0v-2"/><circle cx="18.8" cy="11" r="2.2"/></svg></span>
            <span class="tt"><span class="t1">看病</span><span class="t2">选症状 · 智能分诊</span></span>
          </span>
          <span class="arrow"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
        </button>
      </div>

      <!-- yard -->
      <div class="sec-h"><span class="t">哈基米的院子</span><span class="more">在家陪你</span></div>
      <div class="yard">
        <div class="sun"></div>
        <div class="window"><span class="cloud"></span></div>
        <div class="floor"></div>
        <div class="pills">
          <div class="pill primary"><span class="dot"></span>看病</div>
          <div class="pill alt"><span class="dot"></span>聊天</div>
          <div class="pill alt"><span class="dot"></span>小知识</div>
        </div>
        <div class="rug"></div>
        <div class="bed"></div>
        <div class="box"><span class="b-flap l"></span><span class="b-flap r"></span><span class="b-body"></span><span class="b-open"></span></div>
        <div class="yarn"></div>
        <div class="bubble">你是来找我聊天的吗?<span class="go">→</span></div>
        <div class="cat-walk"><div class="cat"><span class="cat-shadow"></span><span class="c-tail"><i class="tstripe t1"></i><i class="tstripe t2"></i><i class="tstripe t3"></i></span><span class="c-leg back"></span><span class="c-leg front"></span><span class="c-body"><i class="bstripe s1"></i><i class="bstripe s2"></i><i class="bstripe s3"></i></span><span class="c-belly"></span><span class="c-head"><span class="c-ear l"><i></i></span><span class="c-ear r"><i></i></span><span class="c-cheek"></span><i class="c-hstripe"></i><i class="c-hstripe h2"></i><i class="c-hstripe h3"></i><span class="c-eye l"></span><span class="c-eye r"></span><span class="c-nose"></span><span class="c-mouth"></span></span></div></div>
      </div>

      <!-- recent record (green resting state) -->
      <div class="sec-h"><span class="t">最近记录</span><span class="more">查看全部</span></div>
      <div class="record">
        <span class="tier g"><i></i></span>
        <div class="rc">
          <div class="r1">打喷嚏几声,精神食欲都正常</div>
          <div class="r2"><span class="tag g">绿档 · 先观察</span><span>·</span><span>今天 08:12</span></div>
        </div>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab on"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3.5l9 7"/><path d="M5.2 9v10.5h13.6V9"/></svg></span><span>首页</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3.5" width="14" height="17" rx="2.5"/><path d="M9 3.5V6h6V3.5"/><path d="M8.5 11h7M8.5 15h4"/></svg></span><span>分诊</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5h16v11H9l-4 3.5v-3.5H4z"/><path d="M8.5 10h7M8.5 13h4"/></svg></span><span>问答</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8.5" r="2"/><circle cx="16" cy="8.5" r="2"/><circle cx="5" cy="13" r="1.7"/><circle cx="19" cy="13" r="1.7"/><path d="M12 12c-2.6 0-4.5 2-4.5 4.2 0 1.5 1.2 2.3 2.6 2.3 .9 0 1.3-.4 1.9-.4s1 .4 1.9.4c1.4 0 2.6-.8 2.6-2.3C16 14 14.6 12 12 12Z"/></svg></span><span>毛孩子</span></div>
    </div>
  </div>
</body>
</html>
