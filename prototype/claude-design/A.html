<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 A · 档案院子</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .topline{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 12px;}
  .topline .hello{font-size:13.5px;color:var(--terra);font-weight:600;letter-spacing:.4px;white-space:nowrap;}
  .topline .help{font-size:12.5px;color:var(--ink-faint);background:var(--card);padding:6px 12px;border-radius:20px;box-shadow:var(--soft-sm);white-space:nowrap;}

  /* slim profile card */
  .profile{background:var(--card);border-radius:24px;padding:16px;box-shadow:var(--soft);}
  .profile .p-top{display:flex;align-items:center;gap:14px;}
  .profile .avatar{width:54px;height:54px;}
  .profile .p-name{font-family:var(--serif);font-weight:600;font-size:21px;letter-spacing:.4px;}
  .profile .p-meta{font-size:12.5px;color:var(--ink-soft);margin-top:3px;letter-spacing:.2px;}
  .profile .p-meta b{color:var(--ink);font-weight:500;}
  .profile .stats{display:flex;gap:8px;margin-top:14px;}
  .profile .stat{flex:1;background:var(--bg);border-radius:14px;padding:10px 12px;text-align:left;}
  .profile .stat .s-k{font-size:11px;color:var(--ink-faint);letter-spacing:.3px;}
  .profile .stat .s-v{font-family:var(--serif);font-weight:600;font-size:16px;margin-top:3px;}

  /* value prop strip above yard */
  .prop{display:flex;align-items:center;gap:10px;margin:18px 2px 11px;}
  .prop .rgy i{box-shadow:0 0 0 2.5px var(--bg);}
  .prop .pt{font-size:13.5px;color:var(--ink-soft);line-height:1.5;letter-spacing:.1px;}
  .prop .pt b{color:var(--terra);font-weight:600;}

  .yard{height:268px;}
  .pills{position:absolute;top:16px;left:16px;right:16px;z-index:6;justify-content:flex-start;}
  .bubble{left:116px;top:118px;}
  .cat-sleep{left:30px;bottom:18px;}
  .cs-z.z1{left:60px;top:8px;animation-delay:0s;}
  .cs-z.z2{left:72px;top:2px;font-size:11px;animation-delay:1.2s;}

  .care-hint{margin-left:4px;}
</style>
</head>
<body>
  <div class="phone" data-screen-label="方案A首页">
    <div class="statusbar">
      <span class="time">9:41</span>
      <span class="sb-right">
        <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#1a1a18"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4.5" width="3" height="7.5" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 11.2 1 4.3a10.6 10.6 0 0 1 15 0L8.5 11.2Z" fill="#1a1a18"/></svg>
        <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3.2" fill="none" stroke="#1a1a18" stroke-opacity=".4" stroke-width="1"/><rect x="2.6" y="2.6" width="16" height="7.8" rx="2" fill="#1a1a18"/><rect x="23.4" y="4" width="1.8" height="5" rx="1" fill="#1a1a18" fill-opacity=".4"/></svg>
      </span>
    </div>

    <div class="screen">
      <div class="topline">
        <span class="hello">中午好</span>
        <span class="help">使用说明</span>
      </div>

      <!-- slim profile card -->
      <div class="profile">
        <div class="p-top">
          <div class="avatar"><span class="a-ear l"></span><span class="a-ear r"></span><span class="a-face"></span><span class="a-stripe"></span><span class="a-stripe s2"></span><span class="a-stripe s3"></span><span class="a-eye l"></span><span class="a-eye r"></span><span class="a-nose"></span></div>
          <div>
            <div class="p-name">哈基米</div>
            <div class="p-meta"><b>6个月</b> · 母 · 短毛 · 3.5kg</div>
          </div>
        </div>
        <div class="stats">
          <div class="stat"><div class="s-k">疫苗</div><div class="s-v">3 针</div></div>
          <div class="stat"><div class="s-k">绝育</div><div class="s-v">否</div></div>
          <div class="stat"><div class="s-k">相册</div><div class="s-v">0 / 6</div></div>
        </div>
      </div>

      <!-- value prop strip -->
      <div class="prop">
        <span class="rgy"><i class="r"></i><i class="y"></i><i class="g"></i></span>
        <span class="pt"><b>猫不对劲?</b>选症状,30 秒红黄绿就医建议 —— 点院子里的「看病」</span>
      </div>

      <!-- yard hero -->
      <div class="yard">
        <div class="sun"></div>
        <div class="window"><span class="cloud"></span></div>
        <div class="floor"></div>
        <div class="pills">
          <div class="pill primary"><span class="dot"></span>看病</div>
          <div class="pill alt"><span class="dot"></span>聊天</div>
          <div class="pill alt"><span class="dot"></span>小知识</div>
        </div>
        <div class="rug"></div>
        <div class="box"><span class="b-flap l"></span><span class="b-flap r"></span><span class="b-body"></span><span class="b-open"></span></div>
        <div class="yarn"></div>
        <!-- sleeping cat in bed -->
        <div class="bed" style="left:26px;bottom:14px;width:104px;height:48px;"></div>
        <div class="cat-sleep">
          <span class="cs-z z1">z</span><span class="cs-z z2">z</span>
          <span class="cs-tail"></span>
          <span class="cs-body"><i class="csstripe s1"></i><i class="csstripe s2"></i><i class="csstripe s3"></i></span>
          <span class="cs-head"><span class="cs-ear l"></span><span class="cs-ear r"></span><span class="cs-cheek"></span><span class="cs-eye l"></span><span class="cs-eye r"></span><span class="cs-nose"></span></span>
        </div>
        <div class="bubble">睡饱啦,陪我玩会儿?<span class="go">→</span></div>
      </div>

      <!-- draggable care items -->
      <div class="care-row">
        <div class="care-item" title="梳子">
          <svg width="30" height="30" viewBox="0 0 32 32" fill="none"><rect x="9" y="3" width="14" height="13" rx="6.5" fill="#e9b27e" stroke="#cf8a4e" stroke-width="1.3"/><g stroke="#b9763c" stroke-width="1.4" stroke-linecap="round"><path d="M12 8v3M16 7.5v3.5M20 8v3"/></g><rect x="14.5" y="15" width="3" height="13" rx="1.5" fill="#d99a5c"/><circle cx="16" cy="25" r="1.6" fill="#fff"/></svg>
        </div>
        <div class="care-item" title="喝水">
          <svg width="26" height="30" viewBox="0 0 26 32" fill="none"><rect x="7" y="9" width="12" height="20" rx="3" fill="#d9ecf0" stroke="#a9cdd6" stroke-width="1.3"/><rect x="9.5" y="3.5" width="7" height="6" rx="1.6" fill="#cfe6ec" stroke="#a9cdd6" stroke-width="1.2"/><rect x="8.5" y="16" width="9" height="11" rx="2" fill="#bfe0e8"/></svg>
        </div>
        <div class="care-item" title="逗猫棒">
          <svg width="28" height="30" viewBox="0 0 30 32" fill="none"><path d="M7 28 L20 8" stroke="#caa06a" stroke-width="2" stroke-linecap="round"/><path d="M20 8c1-3 4-4 6-3-1 2-1 4-3 5M20 8c2-2 2-5 1-6-2 1-3 3-3 5M20 8c-2 0-4 2-4 4 2 0 4-1 5-3" fill="#e08a7e" opacity=".9"/><circle cx="20" cy="8" r="2.2" fill="#b05a50"/></svg>
        </div>
        <div class="care-hint">长按拖到<br>猫 / 碗上</div>
      </div>

      <!-- recent record (green) -->
      <div class="sec-h"><span class="t">最近</span><span class="more">查看全部</span></div>
      <div class="record">
        <span class="tier g"><i></i></span>
        <div class="rc">
          <div class="r1">打喷嚏几声,精神食欲都正常</div>
          <div class="r2"><span class="tag g">绿档 · 先观察</span><span>·</span><span>3 天前</span></div>
        </div>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
    </div>

    <div class="tabbar">
      <div class="tab on"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3.5l9 7"/><path d="M5.2 9v10.5h13.6V9"/></svg></span><span>首页</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3.5" width="14" height="17" rx="2.5"/><path d="M9 3.5V6h6V3.5"/><path d="M8.5 11h7M8.5 15h4"/></svg></span><span>分诊</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.5h16v11H9l-4 3.5v-3.5H4z"/><path d="M8.5 10h7M8.5 13h4"/></svg></span><span>问答</span></div>
      <div class="tab"><span class="ic"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8.5" r="2"/><circle cx="16" cy="8.5" r="2"/><circle cx="5" cy="13" r="1.7"/><circle cx="19" cy="13" r="1.7"/><path d="M12 12c-2.6 0-4.5 2-4.5 4.2 0 1.5 1.2 2.3 2.6 2.3 .9 0 1.3-.4 1.9-.4s1 .4 1.9.4c1.4 0 2.6-.8 2.6-2.3C16 14 14.6 12 12 12Z"/></svg></span><span>毛孩子</span></div>
    </div>
  </div>
</body>
</html>
